name: Update Advisory Data

on:
  schedule:
    - cron: '17 3 * * *'   # 매일 UTC 03:17 (KST 약 12:17) — 기존 kev/news 워크플로우와 겹치지 않게 시간 조정 가능
  workflow_dispatch: {}    # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-advisory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch GitHub Advisory DB -> advisory.json
        run: node scripts/fetch-advisory.js
        env:
          # 별도 PAT 없이 워크플로우 기본 토큰으로 충분 (읽기 전용, 초당 요청 여유 있음)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push advisory.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add advisory.json
          git diff --cached --quiet || git commit -m "chore: update advisory.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
