name: Fetch Security News

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch RSS feeds & build news.json
        run: |
          python3 << 'EOF'
          import json, urllib.request, xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime

          FEEDS = [
            {
              "source": "thn",
              "url": "https://feeds.feedburner.com/TheHackersNews",
            },
            {
              "source": "bc",
              "url": "https://www.bleepingcomputer.com/feed/",
            },
          ]

          def parse_rss(source, url):
            items = []
            try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                tree = ET.parse(r)
              root = tree.getroot()
              channel = root.find("channel")
              if channel is None:
                channel = root
              for item in channel.findall("item")[:20]:
                title = (item.findtext("title") or "").strip()
                link  = (item.findtext("link") or "").strip()
                desc  = (item.findtext("description") or "").strip()
                # strip HTML tags simply
                import re
                desc = re.sub(r"<[^>]+>", "", desc).strip()[:300]
                pub   = item.findtext("pubDate") or ""
                try:
                  date = parsedate_to_datetime(pub).astimezone(timezone.utc).isoformat()
                except Exception:
                  date = datetime.now(timezone.utc).isoformat()
                if title and link:
                  items.append({"source": source, "title": title, "desc": desc, "url": link, "date": date})
            except Exception as e:
              print(f"[WARN] {source} 피드 오류: {e}")
            return items

          news = []
          for feed in FEEDS:
            items = parse_rss(feed["source"], feed["url"])
            print(f"[{feed['source']}] {len(items)}개 수집")
            news.extend(items)

          # 날짜 내림차순 정렬
          news.sort(key=lambda x: x.get("date", ""), reverse=True)

          with open("news.json", "w", encoding="utf-8") as f:
            json.dump(news, f, ensure_ascii=False, indent=2)

          print(f"총 {len(news)}개 항목 → news.json 저장 완료")
          EOF

      - name: Commit news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet && echo "변경사항 없음" || git commit -m "chore: update news.json [$(date '+%Y-%m-%d')]"
          git push
