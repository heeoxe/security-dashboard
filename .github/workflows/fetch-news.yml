name: Fetch Security News

on:
  schedule:
    - cron: '0 0 * * *' # 매일 새벽 9시 (KST) 자동 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 💡 Node.js 24 강제 전환 옵션 유지

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run News Scraper
        run: |
          cat << 'EOF' > scraper.py
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          from datetime import datetime

          # Bleeping Computer는 제외하고 CISA와 THN 두 가지만 딱 깔끔하게 지정
          FEEDS = {
              "cisa": "https://www.cisa.gov/cybersecurity-advisories/all.xml",
              "thn": "https://feeds.feedburner.com/TheHackersNews"
          }

          def parse_rss(source, url):
              items = []
              try:
                  req = urllib.request.Request(
                      url, 
                      headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"}
                  )
                  with urllib.request.urlopen(req, timeout=15) as r:
                      xml_data = r.read()
                      
                  root = ET.fromstring(xml_data)
                  
                  for item in root.findall('.//item'):
                      title = item.find('title')
                      link = item.find('link')
                      desc = item.find('description')
                      pub_date = item.find('pubDate')
                      
                      date_str = pub_date.text if pub_date is not None else ""
                      try:
                          if date_str:
                              parsed_date = datetime.strptime(date_str.strip()[:25].strip(), "%a, %d %b %Y %H:%M:%S")
                              date_str = parsed_date.isoformat()
                      except Exception:
                          pass

                      items.append({
                          "source": source,
                          "title": title.text if title is not None else "",
                          "desc": desc.text if desc is not None else "",
                          "url": link.text if link is not None else "",
                          "date": date_str
                      })
              except Exception as e:
                  print(f"[{source}] 피드 수집 중 에러 발생: {str(e)}")
              return items

          def main():
              all_news = []
              for source, url in FEEDS.items():
                  print(f"{source} 수집 중...")
                  feed_items = parse_rss(source, url)
                  all_news.extend(feed_items)
                  
              # 최신 날짜 순 정렬 및 상위 50개 커트라인
              all_news.sort(key=lambda x: x.get('date', ''), reverse=True)
              all_news = all_news[:50]
              
              with open('news.json', 'w', encoding='utf-8') as f:
                  json.dump(all_news, f, ensure_ascii=False, indent=2)
              print(f"news.json 빌드 완료! 총 {len(all_news)}개 적재됨.")

          if __name__ == "__main__":
              main()
          EOF
          python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update security news [skip ci]" && git push)
